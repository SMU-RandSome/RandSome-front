<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Security -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' blob: data:; connect-src 'self' https://*.googleapis.com https://*.randsome.online; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- SEO -->
    <title>Randsome — 상명대 축제 랜덤 매칭</title>
    <meta name="description" content="상명대학교 축제 기간 이성 랜덤 매칭 서비스. 무작위·이상형 기반 매칭으로 설레는 인연을 만나보세요." />
    <meta name="keywords" content="상명대, 랜덤매칭, 축제, 소개팅, 이상형" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Randsome — 상명대 축제 랜덤 매칭" />
    <meta property="og:description" content="상명대학교 축제 기간 이성 랜덤 매칭 서비스. 온라인으로 간편하게 인연을 찾아보세요." />
    <meta property="og:locale" content="ko_KR" />

    <!-- PWA / 테마 -->
    <meta name="theme-color" content="#edf3ff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Randsome" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon & Apple Touch Icon -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo-192.png" />

    <!-- Google Fonts 리소스 힌트 (CSS @import보다 먼저 DNS/TLS 선행 처리) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
